name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set version
        id: version
        run: |
          $tag = "v0.0.${{ github.run_number }}"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Version: $tag"

      - name: Bump Cargo.toml version
        run: |
          $ver = "0.0.${{ github.run_number }}"
          (Get-Content Cargo.toml) -replace '^version\s*=\s*"[^"]+"', "version = `"$ver`"" | Set-Content Cargo.toml
          echo "Cargo.toml version set to $ver"

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Delete existing latest tag
        shell: pwsh
        run: |
          git tag -d latest 2>$null; exit 0
          git push origin :refs/tags/latest 2>$null; exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle exe and rclone into zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item target\x86_64-pc-windows-msvc\release\unreal_devtool.exe dist\
          Copy-Item -Recurse Reclone dist\
          Compress-Archive -Path dist\* -DestinationPath unreal_devtool.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: |
            Automated build from commit ${{ github.sha }} on `main`.
          files: unreal_devtool.zip
          make_latest: true
